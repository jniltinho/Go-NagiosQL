services:

  # ─── MariaDB ─────────────────────────────────────────────────────────────────
  db:
    image: mariadb:10.11
    container_name: go-nagiosql-db
    restart: unless-stopped
    environment:
      TZ:                  America/Sao_Paulo
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE:      ${MYSQL_DATABASE:-nagiosql}
      MYSQL_USER:          ${MYSQL_USER:-nagiosql}
      MYSQL_PASSWORD:      ${MYSQL_PASSWORD:-nagiosqlpass}
    volumes:
      - ./volumes/db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - nagios-net

  # ─── Nagios Core + nagiosql REST API ─────────────────────────────────────────
  nagios:
    build:
      context: ../..
      dockerfile: docker/go-nagiosql/Dockerfile
    image: go-nagiosql:latest
    container_name: go-nagiosql
    hostname: go-nagiosql
    restart: unless-stopped
    environment:
      TZ:                    America/Sao_Paulo
      NAGIOS_ADMIN_PASSWORD: ${NAGIOS_ADMIN_PASSWORD:-nagiosadmin}
      DB_HOST:               db
      DB_PORT:               ${DB_PORT:-3306}
      DB_NAME:               ${MYSQL_DATABASE:-nagiosql}
      DB_USER:               ${MYSQL_USER:-nagiosql}
      DB_PASSWORD:           ${MYSQL_PASSWORD:-nagiosqlpass}
      NAGIOSQL_USER:         ${NAGIOSQL_USER:-admin}
      NAGIOSQL_PASSWORD:     ${NAGIOSQL_PASSWORD:-admin}
      # Viper env var overrides for the Go binary (NAGIOSQL_<SECTION>_<KEY>)
      NAGIOSQL_DATABASE_HOST:     db
      NAGIOSQL_DATABASE_PORT:     ${DB_PORT:-3306}
      NAGIOSQL_DATABASE_NAME:     ${MYSQL_DATABASE:-nagiosql}
      NAGIOSQL_DATABASE_USER:     ${MYSQL_USER:-nagiosql}
      NAGIOSQL_DATABASE_PASSWORD: ${MYSQL_PASSWORD:-nagiosqlpass}
      NAGIOSQL_JWT_SECRET:        ${JWT_SECRET:-change-me-to-32-chars-minimum-ok!}
    volumes:
      - ./volumes/nagios-etc:/etc/nagios4
      - ./volumes/nagiosql-etc:/etc/nagiosql
      - ./volumes/nagios-var:/var/lib/nagios4
      - ./volumes/nagios-plugins:/usr/lib/nagios/plugins
    cap_add:
      - NET_RAW
    ports:
      - "${NAGIOS_PORT:-8080}:80"
      - "${NAGIOSQL_PORT:-8081}:8081"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - nagios-net

networks:
  nagios-net:
    driver: bridge
