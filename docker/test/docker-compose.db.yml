version: "3.9"

services:
  db:
    image: mariadb:10.11
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: nagiosql_test
      MYSQL_USER: nagiosql
      MYSQL_PASSWORD: test
    ports:
      - "3307:3306"
    volumes:
      - mariadb-test-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-unagiosql", "-ptest"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  mariadb-test-data:
