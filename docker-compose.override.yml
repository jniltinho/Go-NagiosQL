# docker-compose.override.yml
# Drop this file alongside the upstream DOCUMENTS/docker/nagios-core/docker-compose.yml
# to add the go-nagiosql service into the existing Nagios stack.
#
# Usage:
#   cp docker-compose.override.yml DOCUMENTS/docker/nagios-core/docker-compose.override.yml
#   cd DOCUMENTS/docker/nagios-core
#   docker compose up -d
#
# go-nagiosql reads config.toml.docker (copied to /app/config.toml inside the container).

version: "3.9"

services:
  go-nagiosql:
    build:
      context: ../../../go-nagiosql
      dockerfile: Dockerfile
    image: go-nagiosql:latest
    container_name: go-nagiosql
    restart: unless-stopped
    ports:
      - "8081:8081"
    volumes:
      - ./config.toml.docker:/app/config.toml:ro
      - nagios-etc:/usr/local/nagios/etc
      - nagios-var:/usr/local/nagios/var
    environment:
      - NAGIOSQL_DATABASE_HOST=db
      - NAGIOSQL_DATABASE_PORT=3306
    depends_on:
      db:
        condition: service_healthy
    networks:
      - nagios-net
    command: ["serve", "--config", "/app/config.toml"]
