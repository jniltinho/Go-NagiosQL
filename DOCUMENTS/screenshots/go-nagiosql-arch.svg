<svg xmlns="http://www.w3.org/2000/svg" width="900" height="510" viewBox="0 0 900 510">
  <defs>
    <filter id="sh" x="-10%" y="-20%" width="130%" height="160%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <marker id="a" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#64748B"/>
    </marker>
    <marker id="ab" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#00ADD8"/>
    </marker>
    <marker id="ag" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#22C55E"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="510" rx="16" fill="#0F172A"/>

  <!-- Title -->
  <text x="450" y="36" font-family="system-ui,sans-serif" font-size="20" font-weight="700" fill="#F1F5F9" text-anchor="middle">Go-NagiosQL — Architecture</text>
  <text x="450" y="57" font-family="system-ui,sans-serif" font-size="11" fill="#475569" text-anchor="middle">Go 1.26 · Echo v5 · GORM · MariaDB · JWT HS256</text>

  <!-- Lane backgrounds -->
  <rect x="10" y="68" width="232" height="430" rx="10" fill="#1E293B" opacity="0.45"/>
  <rect x="250" y="68" width="316" height="430" rx="10" fill="#00ADD8" opacity="0.05"/>
  <rect x="574" y="68" width="316" height="430" rx="10" fill="#22C55E" opacity="0.05"/>

  <!-- Lane labels -->
  <text x="126" y="86" font-family="system-ui,sans-serif" font-size="9" font-weight="700" fill="#64748B" text-anchor="middle" letter-spacing="2">CLIENT</text>
  <text x="408" y="86" font-family="system-ui,sans-serif" font-size="9" font-weight="700" fill="#00ADD8" text-anchor="middle" letter-spacing="2">GO-NAGIOSQL</text>
  <text x="732" y="86" font-family="system-ui,sans-serif" font-size="9" font-weight="700" fill="#22C55E" text-anchor="middle" letter-spacing="2">NAGIOS CORE</text>

  <!-- ═══ CLIENT ═══ -->
  <rect x="20" y="106" width="210" height="54" rx="8" fill="#1E293B" stroke="#475569" stroke-width="1.5" filter="url(#sh)"/>
  <text x="125" y="128" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#CBD5E1" text-anchor="middle">HTTP Client</text>
  <text x="125" y="148" font-family="system-ui,sans-serif" font-size="10" fill="#64748B" text-anchor="middle">curl · Postman · Frontend App</text>

  <!-- ═══ GO-NAGIOSQL ═══ -->
  <!-- JWT Middleware -->
  <rect x="260" y="106" width="296" height="54" rx="8" fill="#0D3A4A" stroke="#00ADD8" stroke-width="1.5" filter="url(#sh)"/>
  <text x="408" y="127" font-family="system-ui,sans-serif" font-size="12" font-weight="700" fill="#00ADD8" text-anchor="middle">JWT Middleware</text>
  <text x="408" y="147" font-family="system-ui,sans-serif" font-size="10" fill="#7DD3EA" text-anchor="middle">validates Bearer token · extracts role claims</text>

  <!-- Echo Router -->
  <rect x="260" y="186" width="296" height="54" rx="8" fill="#0D3A4A" stroke="#00ADD8" stroke-width="1.5" filter="url(#sh)"/>
  <text x="408" y="207" font-family="system-ui,sans-serif" font-size="12" font-weight="700" fill="#00ADD8" text-anchor="middle">Echo v5 Router</text>
  <text x="408" y="227" font-family="system-ui,sans-serif" font-size="10" fill="#7DD3EA" text-anchor="middle">REST endpoints · versioned /api/v1/</text>

  <!-- API Handlers -->
  <rect x="260" y="266" width="296" height="68" rx="8" fill="#0D3A4A" stroke="#00ADD8" stroke-width="1.5" filter="url(#sh)"/>
  <text x="408" y="287" font-family="system-ui,sans-serif" font-size="12" font-weight="700" fill="#00ADD8" text-anchor="middle">API Handlers (CRUD)</text>
  <text x="408" y="306" font-family="system-ui,sans-serif" font-size="10" fill="#7DD3EA" text-anchor="middle">hosts · services · commands · contacts</text>
  <text x="408" y="323" font-family="system-ui,sans-serif" font-size="10" fill="#7DD3EA" text-anchor="middle">templates · users · settings · import</text>

  <!-- Config Generator -->
  <rect x="260" y="360" width="296" height="54" rx="8" fill="#0D3A4A" stroke="#00ADD8" stroke-width="1.5" filter="url(#sh)"/>
  <text x="408" y="381" font-family="system-ui,sans-serif" font-size="12" font-weight="700" fill="#00ADD8" text-anchor="middle">Config Generator</text>
  <text x="408" y="401" font-family="system-ui,sans-serif" font-size="10" fill="#7DD3EA" text-anchor="middle">PHP-compatible .cfg format · auto-backup</text>

  <!-- ═══ NAGIOS CORE ═══ -->
  <!-- MariaDB -->
  <rect x="584" y="266" width="296" height="68" rx="8" fill="#0A2E14" stroke="#22C55E" stroke-width="1.5" filter="url(#sh)"/>
  <text x="732" y="287" font-family="system-ui,sans-serif" font-size="12" font-weight="700" fill="#22C55E" text-anchor="middle">MariaDB  ·  GORM</text>
  <text x="732" y="306" font-family="system-ui,sans-serif" font-size="10" fill="#86EFAC" text-anchor="middle">tbl_host · tbl_service · tbl_command</text>
  <text x="732" y="323" font-family="system-ui,sans-serif" font-size="10" fill="#86EFAC" text-anchor="middle">tbl_contact · tbl_lnk* (FK join tables)</text>

  <!-- .cfg Files -->
  <rect x="584" y="360" width="296" height="54" rx="8" fill="#0A2E14" stroke="#22C55E" stroke-width="1.5" filter="url(#sh)"/>
  <text x="732" y="381" font-family="system-ui,sans-serif" font-size="12" font-weight="700" fill="#22C55E" text-anchor="middle">Nagios .cfg Files</text>
  <text x="732" y="401" font-family="system-ui,sans-serif" font-size="10" fill="#86EFAC" text-anchor="middle">hosts/*.cfg · services/*.cfg · backup/</text>

  <!-- Nagios Daemon -->
  <rect x="584" y="440" width="296" height="54" rx="8" fill="#0A2E14" stroke="#22C55E" stroke-width="2" filter="url(#sh)"/>
  <text x="732" y="461" font-family="system-ui,sans-serif" font-size="12" font-weight="700" fill="#22C55E" text-anchor="middle">Nagios Core 4 Daemon</text>
  <text x="732" y="480" font-family="system-ui,sans-serif" font-size="10" fill="#86EFAC" text-anchor="middle">scheduler · checks · notifications</text>

  <!-- ═══ ARROWS ═══ -->
  <!-- HTTP Client → JWT -->
  <line x1="230" y1="133" x2="258" y2="133" stroke="#64748B" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="244" y="126" font-family="system-ui,sans-serif" font-size="9" fill="#475569" text-anchor="middle">Bearer</text>

  <!-- JWT ↓ Echo -->
  <line x1="408" y1="160" x2="408" y2="184" stroke="#00ADD8" stroke-width="1.5" marker-end="url(#ab)"/>

  <!-- Echo ↓ Handlers -->
  <line x1="408" y1="240" x2="408" y2="264" stroke="#00ADD8" stroke-width="1.5" marker-end="url(#ab)"/>

  <!-- Handlers → MariaDB (bidirectional) -->
  <line x1="556" y1="291" x2="582" y2="291" stroke="#22C55E" stroke-width="1.5" marker-end="url(#ag)"/>
  <line x1="582" y1="307" x2="556" y2="307" stroke="#22C55E" stroke-width="1.5" marker-end="url(#ag)"/>

  <!-- Handlers ↓ Config Gen -->
  <line x1="408" y1="334" x2="408" y2="358" stroke="#00ADD8" stroke-width="1.5" marker-end="url(#ab)"/>

  <!-- Config Gen → .cfg Files -->
  <line x1="556" y1="387" x2="582" y2="387" stroke="#22C55E" stroke-width="1.5" marker-end="url(#ag)"/>

  <!-- .cfg ↓ Nagios (via reload_trigger) -->
  <line x1="732" y1="414" x2="732" y2="438" stroke="#22C55E" stroke-width="1.5" marker-end="url(#ag)"/>
  <text x="800" y="430" font-family="system-ui,sans-serif" font-size="9" fill="#4ADE80" text-anchor="middle">reload_trigger</text>
</svg>
