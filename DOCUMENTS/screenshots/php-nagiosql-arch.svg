<svg xmlns="http://www.w3.org/2000/svg" width="900" height="500" viewBox="0 0 900 500">
  <defs>
    <filter id="sh" x="-10%" y="-20%" width="130%" height="160%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <marker id="a" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#64748B"/>
    </marker>
    <marker id="ap" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#818CF8"/>
    </marker>
    <marker id="ag" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#22C55E"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="500" rx="16" fill="#0F172A"/>

  <!-- Title -->
  <text x="450" y="36" font-family="system-ui,sans-serif" font-size="20" font-weight="700" fill="#F1F5F9" text-anchor="middle">PHP NagiosQL — Architecture</text>
  <text x="450" y="57" font-family="system-ui,sans-serif" font-size="11" fill="#475569" text-anchor="middle">PHP · nginx · supervisord · MariaDB · Nagios Core 4</text>

  <!-- Lane backgrounds -->
  <rect x="10" y="68" width="232" height="420" rx="10" fill="#1E293B" opacity="0.45"/>
  <rect x="250" y="68" width="396" height="420" rx="10" fill="#818CF8" opacity="0.05"/>
  <rect x="654" y="68" width="236" height="420" rx="10" fill="#22C55E" opacity="0.05"/>

  <!-- Lane labels -->
  <text x="126" y="86" font-family="system-ui,sans-serif" font-size="9" font-weight="700" fill="#64748B" text-anchor="middle" letter-spacing="2">BROWSER</text>
  <text x="448" y="86" font-family="system-ui,sans-serif" font-size="9" font-weight="700" fill="#818CF8" text-anchor="middle" letter-spacing="2">PHP NAGIOSQL CONTAINER</text>
  <text x="772" y="86" font-family="system-ui,sans-serif" font-size="9" font-weight="700" fill="#22C55E" text-anchor="middle" letter-spacing="2">DATA / RUNTIME</text>

  <!-- ═══ BROWSER ═══ -->
  <rect x="20" y="106" width="210" height="64" rx="8" fill="#1E293B" stroke="#475569" stroke-width="1.5" filter="url(#sh)"/>
  <text x="125" y="130" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#CBD5E1" text-anchor="middle">Web Browser</text>
  <text x="125" y="149" font-family="system-ui,sans-serif" font-size="10" fill="#64748B" text-anchor="middle">Admin manages Nagios objects</text>
  <text x="125" y="163" font-family="system-ui,sans-serif" font-size="10" fill="#64748B" text-anchor="middle">via web forms</text>

  <!-- ═══ PHP NAGIOSQL CONTAINER ═══ -->
  <!-- Container border -->
  <rect x="258" y="96" width="386" height="394" rx="12" fill="none" stroke="#4338CA" stroke-width="1" stroke-dasharray="6,4" opacity="0.6"/>
  <text x="451" y="113" font-family="system-ui,sans-serif" font-size="9" fill="#4338CA" text-anchor="middle">supervisord managed</text>

  <!-- nginx -->
  <rect x="268" y="120" width="366" height="54" rx="8" fill="#1E1B4B" stroke="#818CF8" stroke-width="1.5" filter="url(#sh)"/>
  <text x="451" y="141" font-family="system-ui,sans-serif" font-size="12" font-weight="700" fill="#818CF8" text-anchor="middle">nginx  :80</text>
  <text x="451" y="161" font-family="system-ui,sans-serif" font-size="10" fill="#A5B4FC" text-anchor="middle">reverse proxy · serves PHP via php-fpm · CGI via fcgiwrap</text>

  <!-- NagiosQL PHP -->
  <rect x="268" y="200" width="366" height="72" rx="8" fill="#1E1B4B" stroke="#818CF8" stroke-width="1.5" filter="url(#sh)"/>
  <text x="451" y="222" font-family="system-ui,sans-serif" font-size="12" font-weight="700" fill="#818CF8" text-anchor="middle">NagiosQL PHP Application</text>
  <text x="451" y="241" font-family="system-ui,sans-serif" font-size="10" fill="#A5B4FC" text-anchor="middle">object management · templates · user auth</text>
  <text x="451" y="260" font-family="system-ui,sans-serif" font-size="10" fill="#A5B4FC" text-anchor="middle">html_template_it · NagConfigClass</text>

  <!-- Config Writer (verify.php) -->
  <rect x="268" y="298" width="366" height="54" rx="8" fill="#1E1B4B" stroke="#818CF8" stroke-width="1.5" filter="url(#sh)"/>
  <text x="451" y="320" font-family="system-ui,sans-serif" font-size="12" font-weight="700" fill="#818CF8" text-anchor="middle">Config Writer  (verify.php)</text>
  <text x="451" y="340" font-family="system-ui,sans-serif" font-size="10" fill="#A5B4FC" text-anchor="middle">generates · validates · triggers reload</text>

  <!-- reload-watcher.sh -->
  <rect x="268" y="378" width="366" height="50" rx="8" fill="#1E1B4B" stroke="#6366F1" stroke-width="1" filter="url(#sh)"/>
  <text x="451" y="399" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#818CF8" text-anchor="middle">reload-watcher.sh</text>
  <text x="451" y="418" font-family="system-ui,sans-serif" font-size="10" fill="#A5B4FC" text-anchor="middle">polls reload_trigger · sends SIGHUP</text>

  <!-- ═══ DATA / RUNTIME ═══ -->
  <!-- MariaDB -->
  <rect x="664" y="200" width="216" height="72" rx="8" fill="#0A2E14" stroke="#22C55E" stroke-width="1.5" filter="url(#sh)"/>
  <text x="772" y="222" font-family="system-ui,sans-serif" font-size="12" font-weight="700" fill="#22C55E" text-anchor="middle">MariaDB</text>
  <text x="772" y="241" font-family="system-ui,sans-serif" font-size="10" fill="#86EFAC" text-anchor="middle">tbl_host · tbl_service</text>
  <text x="772" y="260" font-family="system-ui,sans-serif" font-size="10" fill="#86EFAC" text-anchor="middle">tbl_command · tbl_lnk*</text>

  <!-- .cfg Files -->
  <rect x="664" y="298" width="216" height="54" rx="8" fill="#0A2E14" stroke="#22C55E" stroke-width="1.5" filter="url(#sh)"/>
  <text x="772" y="320" font-family="system-ui,sans-serif" font-size="12" font-weight="700" fill="#22C55E" text-anchor="middle">Nagios .cfg Files</text>
  <text x="772" y="340" font-family="system-ui,sans-serif" font-size="10" fill="#86EFAC" text-anchor="middle">hosts/ · services/</text>

  <!-- Nagios Daemon -->
  <rect x="664" y="378" width="216" height="50" rx="8" fill="#0A2E14" stroke="#22C55E" stroke-width="2" filter="url(#sh)"/>
  <text x="772" y="399" font-family="system-ui,sans-serif" font-size="12" font-weight="700" fill="#22C55E" text-anchor="middle">Nagios Core 4</text>
  <text x="772" y="418" font-family="system-ui,sans-serif" font-size="10" fill="#86EFAC" text-anchor="middle">daemon · scheduler · checks</text>

  <!-- ═══ ARROWS ═══ -->
  <!-- Browser → nginx -->
  <line x1="230" y1="138" x2="266" y2="138" stroke="#64748B" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="248" y="130" font-family="system-ui,sans-serif" font-size="9" fill="#475569" text-anchor="middle">HTTP</text>

  <!-- nginx ↓ NagiosQL -->
  <line x1="451" y1="174" x2="451" y2="198" stroke="#818CF8" stroke-width="1.5" marker-end="url(#ap)"/>

  <!-- NagiosQL ↔ MariaDB -->
  <line x1="634" y1="222" x2="662" y2="222" stroke="#22C55E" stroke-width="1.5" marker-end="url(#ag)"/>
  <line x1="662" y1="242" x2="634" y2="242" stroke="#22C55E" stroke-width="1.5" marker-end="url(#ag)"/>

  <!-- NagiosQL ↓ Config Writer -->
  <line x1="451" y1="272" x2="451" y2="296" stroke="#818CF8" stroke-width="1.5" marker-end="url(#ap)"/>

  <!-- Config Writer → .cfg Files -->
  <line x1="634" y1="325" x2="662" y2="325" stroke="#22C55E" stroke-width="1.5" marker-end="url(#ag)"/>

  <!-- Config Writer ↓ reload-watcher -->
  <line x1="451" y1="352" x2="451" y2="376" stroke="#818CF8" stroke-width="1.5" marker-end="url(#ap)"/>

  <!-- reload-watcher → Nagios Daemon -->
  <line x1="634" y1="403" x2="662" y2="403" stroke="#22C55E" stroke-width="1.5" marker-end="url(#ag)"/>
  <text x="648" y="396" font-family="system-ui,sans-serif" font-size="8" fill="#4ADE80" text-anchor="middle">SIGHUP</text>

  <!-- .cfg Files ↓ Nagios -->
  <line x1="772" y1="352" x2="772" y2="376" stroke="#22C55E" stroke-width="1.5" marker-end="url(#ag)"/>
</svg>
