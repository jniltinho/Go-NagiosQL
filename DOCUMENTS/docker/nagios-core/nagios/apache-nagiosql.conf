Listen 8081

<VirtualHost *:8081>
    DocumentRoot /var/www/nagiosql
    DirectoryIndex index.php

    <Directory /var/www/nagiosql>
        Options FollowSymLinks
        AllowOverride None
        Require all granted
    </Directory>

    # Protege arquivos PHP do diretório de configuração (settings.php tem credenciais DB)
    # CSS e outros estáticos dentro de config/ são servidos normalmente
    <Directory /var/www/nagiosql/config>
        AllowOverride None
        Require all granted
        <FilesMatch "\.php$">
            Require all denied
        </FilesMatch>
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/nagiosql-error.log
    CustomLog ${APACHE_LOG_DIR}/nagiosql-access.log combined
</VirtualHost>
