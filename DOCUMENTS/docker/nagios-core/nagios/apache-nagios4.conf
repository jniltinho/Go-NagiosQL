# VirtualHost Nagios4 — substitui nagios4-cgi.conf do pacote Debian.
# Caminhos retirados de /etc/apache2/conf-available/nagios4-cgi.conf.
# Autenticação: Basic Auth com htpasswd (em vez de Require ip + Digest Auth do pacote).

<VirtualHost *:80>
    ServerAdmin webmaster@localhost

    # Redireciona raiz para visão tática (index.html em htdocs já faz meta-refresh)
    RedirectMatch ^/$ /cgi-bin/nagios4/tac.cgi

    # ── Stylesheets (/etc/nagios4/stylesheets) ──────────────────
    Alias /nagios4/stylesheets /etc/nagios4/stylesheets
    <Directory /etc/nagios4/stylesheets>
        Options FollowSymLinks
        AllowOverride None
        AuthName "Nagios Access"
        AuthType Basic
        AuthUserFile /etc/nagios4/htpasswd.users
        Require valid-user
    </Directory>

    # ── Arquivos estáticos (/usr/share/nagios4/htdocs) ──────────
    Alias /nagios4 /usr/share/nagios4/htdocs
    <Directory /usr/share/nagios4/htdocs>
        Options FollowSymLinks ExecCGI
        DirectoryIndex index.php index.html
        AllowOverride None
        AuthName "Nagios Access"
        AuthType Basic
        AuthUserFile /etc/nagios4/htpasswd.users
        Require valid-user
    </Directory>

    # ── CGIs (/usr/lib/cgi-bin/nagios4) ─────────────────────────
    # Dois aliases conforme nagios4-cgi.conf do pacote
    ScriptAlias /cgi-bin/nagios4   /usr/lib/cgi-bin/nagios4
    ScriptAlias /nagios4/cgi-bin   /usr/lib/cgi-bin/nagios4
    <Directory /usr/lib/cgi-bin/nagios4>
        Options ExecCGI
        AllowOverride None
        SetEnv NAGIOS_CGI_CONFIG /etc/nagios4/cgi.cfg
        AuthName "Nagios Access"
        AuthType Basic
        AuthUserFile /etc/nagios4/htpasswd.users
        Require valid-user
    </Directory>

    ErrorLog  ${APACHE_LOG_DIR}/nagios4-error.log
    CustomLog ${APACHE_LOG_DIR}/nagios4-access.log combined
</VirtualHost>
