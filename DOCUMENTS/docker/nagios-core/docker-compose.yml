services:

  # ─── MariaDB ───────────────────────────────────────────────────────────────
  db:
    image: mariadb:10.11
    container_name: nagios-db
    restart: unless-stopped
    environment:
      TZ:                  America/Sao_Paulo
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE:      ${MYSQL_DATABASE:-nagiosql}
      MYSQL_USER:          ${MYSQL_USER:-nagiosql}
      MYSQL_PASSWORD:      ${MYSQL_PASSWORD:-nagiosqlpass}
    volumes:
      - ./volumes/db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - nagios-net

  # ─── Nagios Core + NagiosQL ────────────────────────────────────────────────
  nagios:
    build:
      context: .
      dockerfile: nagios/Dockerfile
    container_name: nagios-core
    hostname: nagios-core
    restart: unless-stopped
    environment:
      TZ:                    America/Sao_Paulo
      NAGIOS_ADMIN_PASSWORD: ${NAGIOS_ADMIN_PASSWORD:-nagiosadmin}
      DB_HOST:               db
      DB_PORT:               ${DB_PORT:-3306}
      DB_NAME:               ${MYSQL_DATABASE:-nagiosql}
      DB_USER:               ${MYSQL_USER:-nagiosql}
      DB_PASSWORD:           ${MYSQL_PASSWORD:-nagiosqlpass}
      NAGIOSQL_USER:         ${NAGIOSQL_USER:-admin}
      NAGIOSQL_PASSWORD:     ${NAGIOSQL_PASSWORD:-admin}
    volumes:
      - ./volumes/nagios-etc:/etc/nagios4         # config principal do daemon
      - ./volumes/nagiosql-etc:/etc/nagiosql       # configs gerados pelo NagiosQL
      - ./volumes/nagios-var:/var/lib/nagios4      # runtime: status, cmd pipe, spool
      - ./volumes/nagios-plugins:/usr/lib/nagios/plugins
      - ./volumes/nagiosql-config:/var/www/nagiosql/config
    cap_add:
      - NET_RAW
    ports:
      - "${NAGIOS_PORT:-8080}:80"
      - "${NAGIOSQL_PORT:-8081}:8081"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - nagios-net

# ─── Networks ────────────────────────────────────────────────────────────────
networks:
  nagios-net:
    driver: bridge
